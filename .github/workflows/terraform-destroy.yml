# ##############################################################################
# DESTROY PIPELINE - lsd-payments
#
# Run this manually at the end of the day to avoid costs.
# Tears down all infrastructure created by the main pipeline.
#
# How to run:
#   GitHub repo -> Actions -> Destroy Infrastructure -> Run workflow
#
# WARNING: This deletes everything. Only run when you are done for the day.
# ##############################################################################

name: Destroy Infrastructure

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type DESTROY to confirm you want to delete all infrastructure"
        required: true
        type: string

permissions:
  id-token: write
  contents: read

env:
  TF_VERSION: "1.7.5"
  WORKING_DIR: environments/dev

jobs:
  destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest
    environment: production-infra
    if: github.event.inputs.confirm == 'DESTROY'
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=eks-demo-tfstate-${{ secrets.AWS_ACCOUNT_ID }}" \
            -backend-config="key=dev/terraform.tfstate" \
            -backend-config="region=${{ secrets.AWS_REGION }}"

      - name: Cleanup ALB and Target Groups
        run: |
          echo "Cleaning up ALBs created by ALB Controller..."
          ALB_ARNS=$(aws elbv2 describe-load-balancers --region us-east-2 \
            --query "LoadBalancers[?contains(LoadBalancerName, 'lsdpayme')].LoadBalancerArn" \
            --output text)
          for ARN in $ALB_ARNS; do
            echo "Deleting ALB: $ARN"
            aws elbv2 delete-load-balancer --load-balancer-arn $ARN --region us-east-2
          done
          [ -n "$ALB_ARNS" ] && sleep 30 || echo "No ALBs found"

          echo "Cleaning up target groups..."
          TG_ARNS=$(aws elbv2 describe-target-groups --region us-east-2 \
            --query "TargetGroups[?contains(TargetGroupName, 'lsdpayme')].TargetGroupArn" \
            --output text)
          for ARN in $TG_ARNS; do
            echo "Deleting target group: $ARN"
            aws elbv2 delete-target-group --target-group-arn $ARN --region us-east-2
          done
          echo "Cleaning up ALB security groups..."
          VPC_ID=$(aws ec2 describe-vpcs --region us-east-2 \
            --filters "Name=tag:Name,Values=lsd-payments-dev" \
            --query "Vpcs[0].VpcId" --output text)
          if [ "$VPC_ID" != "None" ] && [ -n "$VPC_ID" ]; then
            SG_IDS=$(aws ec2 describe-security-groups --region us-east-2 \
              --filters "Name=vpc-id,Values=$VPC_ID" \
              --query "SecurityGroups[?GroupName!='default'].GroupId" \
              --output text)
            for SG in $SG_IDS; do
              echo "Deleting security group: $SG"
              aws ec2 delete-security-group --group-id $SG --region us-east-2 || true
            done
          fi
          echo "Cleanup complete"

      - name: Terraform Destroy
        run: terraform destroy -auto-approve
